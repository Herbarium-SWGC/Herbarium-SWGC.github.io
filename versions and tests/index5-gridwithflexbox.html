<body>

	<div class="grid-item space"></div>

	Head
		<div class="flexbox-container">
			<div class="flexbox-item flex-menu1">
			Menu 1
			</div>
			<div class="flexbox-item flex-menu2">
			Menu 2			
			</div>
			<div class="flexbox-item flex-menu3">

			</div>
			<div class="flexbox-item flex-menu4">

				<div class="flexbox-item column1">

				</div>
			</div>

	</div>

	<div class="grid-item footer-center">

	</div>
